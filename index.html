<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>アプリサポートポータル</title>
    <meta name="description" content="複数アプリで共通運用するサポートページとプライバシーポリシー。">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Shared Support</p>
        <h1>アプリサポートポータル</h1>
        <p class="lead">
          複数アプリのサポート案内とプライバシーポリシーをまとめる共有ページです。
        </p>
        <div class="actions">
          <a class="button primary" href="support/">サポートページ</a>
          <a class="button" href="privacy/">プライバシーポリシー</a>
        </div>
      </section>

      <section class="section">
        <h2>対応中のアプリ</h2>
        <p>
          各アプリの案内は、このポータルの中に追加して運用できます。
        </p>
        <ul>
          <li>掲載準備中のアプリ: サポートページとプライバシーポリシーを追加予定</li>
        </ul>
      </section>
    </main>
  </body>
</html>
